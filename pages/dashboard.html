<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="../style.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:#f5f5f5;
}
.topo{
    background:#ff6600;
    color:white;
    padding:15px;
    text-align:center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
}
.topo img {
    height: 60px;
    width: auto;
    object-fit: contain;
}
.topo h1 {
    font-size: 24px;
    font-weight: bold;
}
.menu{
    background:#222;
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    flex-wrap: wrap;
}
.menu button{
    width:auto;
    padding:10px 20px;
    border:none;
    border-radius:5px;
    background:#ff6600;
    color:white;
    cursor:pointer;
    font-weight: bold;
}
.menu .btn-sair {
    background: #e74c3c;
}
.container{
    max-width:1400px;
    margin:20px auto;
    padding:15px;
}
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}
.card h3{
    margin-bottom:10px;
    color:#666;
}
.valor{
    font-size:32px;
    font-weight:bold;
    color:#27ae60;
}
.valor-despesa{
    color:#e74c3c;
}
.valor-lucro{
    color:#2980b9;
}
.tabela{
    margin-top:30px;
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}
table{
    width:100%;
    border-collapse:collapse;
}
th{
    background:#ff6600;
    color:white;
    padding:10px;
}
td{
    padding:10px;
    border-bottom:1px solid #ddd;
}
</style>
</head>
<body>

<div class="topo">
    <img src="../assets/logo.png" alt="Logo V.E Batatas">
    <h1>V.E BATATAS E PRATINHOS</h1>
</div>

<div class="menu">
    <button onclick="location.href='dashboard.html'">Dashboard</button>
    <button onclick="location.href='pedidos.html'">Pedidos</button>
    <button onclick="location.href='produtos.html'">Produtos</button>
    <button onclick="location.href='despesas.html'">Despesas</button>
    <button class="btn-sair" onclick="sairDoSistema()">Sair</button>
</div>

<div class="container">
    <div class="cards">
        <div class="card">
            <h3>Vendas Hoje</h3>
            <div class="valor" id="vendasHoje">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Despesas Hoje</h3>
            <div class="valor valor-despesa" id="despesasHoje">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Lucro Hoje</h3>
            <div class="valor valor-lucro" id="lucroHoje">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Vendas Mês</h3>
            <div class="valor" id="vendasMes">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Despesas Mês</h3>
            <div class="valor valor-despesa" id="despesasMes">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Lucro Mês</h3>
            <div class="valor valor-lucro" id="lucroMes">R$ 0,00</div>
        </div>
    </div>

    <div class="tabela">
        <h2>Últimos Pedidos</h2>
        <br>
        <table>
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Total</th>
                    <th>Pagamento</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="ultimosPedidos"></tbody>
        </table>
    </div>
</div>

<script src="../config.js"></script>
<script>
const inicioOperacional = 4;

function sairDoSistema() {
    localStorage.clear();
    window.location = "../index.html";
}

function moeda(valor){
    return valor.toLocaleString("pt-BR", { style:"currency", currency:"BRL" });
}

function obterDataOperacional(){
    const agora = new Date();
    if(agora.getHours() < inicioOperacional){
        agora.setDate(agora.getDate()-1);
    }
    return agora.toISOString().split('T')[0];
}

async function carregarDashboard(){
    try{
        const pedidosResp = await fetch(`${API_URL}/${DATABASE.pedidos}/?user_field_names=true`, {
            headers:{ Authorization:`Token ${BASEROW_TOKEN}` }
        });
        const despesasResp = await fetch(`${API_URL}/${DATABASE.despesas}/?user_field_names=true`, {
            headers:{ Authorization:`Token ${BASEROW_TOKEN}` }
        });

        const pedidosData = await pedidosResp.json();
        const despesasData = await despesasResp.json();

        const pedidos = pedidosData.results || [];
        const despesas = despesasData.results || [];
        const hoje = obterDataOperacional();
        const mesAtual = hoje.substring(0,7);

        let vendasHoje = 0, vendasMes = 0;
        let despesasHoje = 0, despesasMes = 0;

        pedidos.forEach(p=>{
            const data = (p.data || "").substring(0,10);
            const total = Number(p.total || 0);
            if(data === hoje) vendasHoje += total;
            if(data.startsWith(mesAtual)) vendasMes += total;
        });

        despesas.forEach(d=>{
            const data = (d.data || "").substring(0,10);
            const valor = Number(d.valor || 0);
            if(data === hoje) despesasHoje += valor;
            if(data.startsWith(mesAtual)) despesasMes += valor;
        });

        document.getElementById("vendasHoje").innerHTML = moeda(vendasHoje);
        document.getElementById("despesasHoje").innerHTML = moeda(despesasHoje);
        document.getElementById("lucroHoje").innerHTML = moeda(vendasHoje - despesasHoje);
        document.getElementById("vendasMes").innerHTML = moeda(vendasMes);
        document.getElementById("despesasMes").innerHTML = moeda(despesasMes);
        document.getElementById("lucroMes").innerHTML = moeda(vendasMes - despesasMes);

        let html = "";
        pedidos.slice(-10).reverse().forEach(p=>{
            html += `<tr>
                <td>${p.cliente || ''}</td>
                <td>${moeda(Number(p.total || 0))}</td>
                <td>${p.pagamento || ''}</td>
                <td>${p.status || ''}</td>
            </tr>`;
        });
        document.getElementById("ultimosPedidos").innerHTML = html;
    }catch(erro){
        console.log(erro);
        alert("Erro ao carregar dashboard");
    }
}

carregarDashboard();
</script>
</body>
</html>
