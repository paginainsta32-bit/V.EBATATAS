<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forma de Pagamento</title>
<link rel="stylesheet" href="../style.css">
<style>
    body { font-family: Arial; background: #f5f5f5; margin: 0; }
    .topo { background: #ff6600; color: white; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; }
    .container { max-width: 500px; margin: 40px auto; padding: 20px; }
    .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,.1); text-align: center; }
    select { width: 100%; padding: 12px; margin-top: 15px; margin-bottom: 20px; font-size: 16px; border: 1px solid #ddd; border-radius: 5px; }
    button { width: 100%; padding: 14px; background: #27ae60; color: white; font-size: 16px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #219150; }
    .voltar { display: block; margin-top: 15px; color: #ff6600; text-decoration: none; font-weight: bold; }
</style>
</head>
<body>

<div class="topo">CONCLUIR PAGAMENTO</div>

<div class="container">
    <div class="card">
        <h2>Selecione a Forma de Pagamento</h2>
        <p>Escolha como o cliente realizou o pagamento para fechar a venda.</p>
        
        <select id="formaPagamento">
            <option value="Dinheiro">Dinheiro</option>
            <option value="Pix">Pix</option>
            <option value="Cartão de Crédito">Cartão de Crédito</option>
            <option value="Cartão de Débito">Cartão de Débito</option>
        </select>

        <button onclick="confirmarPagamento()">Confirmar e Finalizar</button>
        
        <a href="dashboard.html" class="voltar">Pagar Depois / Voltar</a>
    </div>
</div>

<script src="../config.js"></script>
<script>
async function confirmarPagamento() {
    const pedidoId = localStorage.getItem('pedidoAtual');
    const pagamentoSelecionado = document.getElementById('formaPagamento').value;

    if (!pedidoId) {
        alert("Nenhum pedido recente foi localizado.");
        window.location = 'dashboard.html';
        return;
    }

    try {
        // Atualiza a linha do pedido correspondente no Baserow usando o método PATCH
        const response = await fetch(`${API_URL}/${DATABASE.pedidos}/${pedidoId}/?user_field_names=true`, {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json',
                Authorization: `Token ${BASEROW_TOKEN}`
            },
            body: JSON.stringify({
                pagamento: pagamentoSelecionado,
                status: 'Finalizado'
            })
        });

        if (response.ok) {
            alert("Pedido atualizado e finalizado com sucesso!");
            localStorage.removeItem('pedidoAtual'); // Limpa a sessão do pedido ativo
            window.location = 'dashboard.html';
        } else {
            alert("Erro ao salvar o pagamento no banco de dados.");
        }
    } catch (error) {
        console.error(error);
        alert("Erro na conexão com o servidor.");
    }
}
</script>
</body>
</html>
