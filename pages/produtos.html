<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerenciar Produtos</title>
<style>
    *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
    body{ background:#f5f5f5; }
    .topo{ background:#ff6600; color:white; padding:15px; text-align:center; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
    .topo img { height: 60px; width: auto; }
    .topo h1 { font-size: 24px; font-weight: bold; }
    .menu{ background:#222; display:flex; justify-content:center; gap:10px; padding:10px; flex-wrap: wrap; }
    .menu button{ width:auto; padding:10px 20px; border:none; border-radius:5px; background:#ff6600; color:white; cursor:pointer; font-weight: bold; }
    .menu .btn-sair { background: #e74c3c; }
    .container{ max-width:900px; margin:20px auto; padding:15px; }
    .card{ background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,.1); margin-bottom:20px; }
    .card h2{ margin-bottom: 15px; font-size: 20px; color: #333; }
    .form-grupo { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; }
    .form-campo { flex: 1; min-width: 200px; }
    .form-campo label { font-size: 13px; color: #666; font-weight: bold; display: block; margin-bottom: 5px; }
    input{ width:100%; padding:10px; border: 1px solid #ddd; border-radius: 5px; box-sizing:border-box; }
    .btn-cadastrar{ background: #ff6600; color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; height: 38px; }
    table{ width:100%; border-collapse:collapse; margin-top: 10px; }
    th{ background:#ff6600; color:white; padding:12px; text-align: left; }
    td{ padding:12px; border-bottom:1px solid #ddd; }
</style>
</head>
<body>

<div class="topo">
    <img src="../assets/logo.png" alt="Logo">
    <h1>V.E BATATAS E PRATINHOS</h1>
</div>

<div class="menu">
    <button onclick="location.href='dashboard.html'">Dashboard</button>
    <button onclick="location.href='pedidos.html'">Pedidos</button>
    <button onclick="location.href='produtos.html'">Produtos</button>
    <button onclick="location.href='despesas.html'">Despesas</button>
    <button class="btn-sair" onclick="localStorage.clear(); window.location='../index.html'">Sair</button>
</div>

<div class="container">
    <div class="card">
        <h2>Cadastrar Novo Produto</h2>
        <div class="form-grupo">
            <div class="form-campo">
                <label>Nome do Produto</label>
                <input type="text" id="nomeProduto" placeholder="Ex: BATATA G">
            </div>
            <div class="form-campo" style="max-width: 180px;">
                <label>Preço de Venda (R$)</label>
                <input type="number" id="valorProduto" step="0.01" placeholder="0,00">
            </div>
            <button class="btn-cadastrar" onclick="adicionarProduto()">Cadastrar</button>
        </div>
    </div>

    <div class="card">
        <h2>Cardápio / Produtos Atuais</h2>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Valor Unitário</th>
                </tr>
            </thead>
            <tbody id="tabelaProdutos">
                <tr><td colspan="2">Carregando listagem...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="../config.js"></script>
<script>
function formatoMoeda(v) {
    return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

async function listarProdutos() {
    try {
        const response = await fetch(`${API_URL}/${DATABASE.produtos}/?user_field_names=true`, {
            headers: { Authorization: `Token ${BASEROW_TOKEN}` }
        });
        const data = await response.json();
        let html = '';
        
        if (data.results && data.results.length > 0) {
            data.results.forEach(p => {
                html += `<tr>
                    <td><b>${p.produto || 'Sem nome'}</b></td>
                    <td style="color: #27ae60; font-weight: bold;">${formatoMoeda(p.valor || 0)}</td>
                </tr>`;
            });
        } else {
            html = `<tr><td colspan="2">Nenhum produto cadastrado ainda.</td></tr>`;
        }
        document.getElementById('tabelaProdutos').innerHTML = html;
    } catch (err) {
        console.error(err);
    }
}

async function adicionarProduto() {
    const nome = document.getElementById('nomeProduto').value;
    const valor = document.getElementById('valorProduto').value;

    if (!nome || !valor) { alert("Por favor, preencha o nome e o valor."); return; }

    try {
        const response = await fetch(`${API_URL}/${DATABASE.produtos}/?user_field_names=true`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Token ${BASEROW_TOKEN}` },
            body: JSON.stringify({ produto: nome, valor: Number(valor) })
        });

        if (response.ok) {
            alert("Produto inserido no cardápio!");
            document.getElementById('nomeProduto').value = '';
            document.getElementById('valorProduto').value = '';
            listarProdutos();
        }
    } catch (err) { console.error(err); }
}

listarProdutos();
</script>
</body>
</html>
