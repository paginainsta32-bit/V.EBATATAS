<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerenciar Despesas</title>
<link rel="stylesheet" href="../style.css">
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
    }
    body{
        background:#f5f5f5;
    }
    .topo{
        background:#ff6600;
        color:white;
        padding:15px;
        text-align:center;
        font-size:24px;
        font-weight:bold;
    }
    .menu{
        background:#222;
        display:flex;
        justify-content:center;
        gap:10px;
        padding:10px;
    }
    .menu button{
        width:auto;
        padding:10px 20px;
        border:none;
        border-radius:5px;
        background:#ff6600;
        color:white;
        cursor:pointer;
    }
    .container{
        max-width:900px;
        margin:20px auto;
        padding:15px;
    }
    .card{
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,.1);
        margin-bottom:20px;
    }
    .card h2{
        margin-bottom: 15px;
        font-size: 20px;
        color: #333;
    }
    .form-grupo {
        display: flex;
        gap: 15px;
        align-items: flex-end;
        flex-wrap: wrap;
    }
    .form-campo {
        flex: 1;
        min-width: 200px;
    }
    .form-campo label {
        font-size: 13px;
        color: #666;
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
    }
    input{
        width:100%;
        padding:10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing:border-box;
    }
    .btn-gasto{
        background: #e74c3c;
        color: white;
        border: none;
        padding: 10px 25px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        height: 38px;
    }
    table{
        width:100%;
        border-collapse:collapse;
        margin-top: 10px;
    }
    th{
        background:#e74c3c;
        color:white;
        padding:12px;
        text-align: left;
    }
    td{
        padding:12px;
        border-bottom:1px solid #ddd;
    }
</style>
</head>
<body>

<div class="topo">
    V.E BATATAS E PRATINHOS
</div>

<div class="menu">
    <button onclick="location.href='dashboard.html'">Dashboard</button>
    <button onclick="location.href='pedidos.html'">Pedidos</button>
    <button onclick="location.href='produtos.html'">Produtos</button>
    <button onclick="location.href='despesas.html'">Despesas</button>
</div>

<div class="container">

    <div class="card">
        <h2 style="color: #e74c3c;">Lançar Novo Gasto / Despesa</h2>
        <div class="form-grupo">
            <div class="form-campo">
                <label for="descDespesa">Descrição do Gasto</label>
                <input type="text" id="descDespesa" placeholder="Ex: Compra de Óleo, Sacolas, Batata crua">
            </div>
            <div class="form-campo" style="max-width: 180px;">
                <label for="valorDespesa">Valor Pago (R$)</label>
                <input type="number" id="valorDespesa" step="0.01" placeholder="0,00">
            </div>
            <button class="btn-gasto" onclick="adicionarDespesa()">Registrar Saída</button>
        </div>
    </div>

    <div class="card">
        <h2>Histórico de Despesas</h2>
        <table>
            <thead>
                <tr>
                    <th>Data Lançamento</th>
                    <th>Descrição</th>
                    <th>Custo</th>
                </tr>
            </thead>
            <tbody id="tabelaDespesas">
                <tr>
                    <td colspan="3">Carregando despesas...</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="../config.js"></script>
<script>
function formatoMoeda(v) {
    return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

async function listarDespesas() {
    try {
        const response = await fetch(`${API_URL}/${DATABASE.despesas}/?user_field_names=true`, {
            headers: { Authorization: `Token ${BASEROW_TOKEN}` }
        });
        const data = await response.json();
        let html = '';
        
        if (data.results && data.results.length > 0) {
            data.results.forEach(d => {
                const dataFormatada = d.data ? d.data.substring(0,10).split('-').reverse().join('/') : '---';
                const itemDescricao = d.descricao || d.produto || 'Gasto Geral';
                
                html += `<tr>
                    <td>${dataFormatada}</td>
                    <td><b>${itemDescricao}</b></td>
                    <td style="color: #e74c3c; font-weight: bold;">${formatoMoeda(d.valor || 0)}</td>
                </tr>`;
            });
        } else {
            html = `<tr><td colspan="3">Nenhuma despesa registrada neste período.</td></tr>`;
        }
        document.getElementById('tabelaDespesas').innerHTML = html;
    } catch (err) {
        console.error(err);
        document.getElementById('tabelaDespesas').innerHTML = `<tr><td colspan="3">Erro ao conectar com o banco.</td></tr>`;
    }
}

async function adicionarDespesa() {
    const descricao = document.getElementById('descDespesa').value;
    const valor = document.getElementById('valorDespesa').value;

    if (!descricao || !valor) {
        alert("Informe do que se trata o gasto e o respectivo valor.");
        return;
    }

    try {
        const response = await fetch(`${API_URL}/${DATABASE.despesas}/?user_field_names=true`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                Authorization: `Token ${BASEROW_TOKEN}`
            },
            body: JSON.stringify({
                descricao: descricao,
                valor: Number(valor),
                data: new Date().toISOString()
            })
        });

        if (response.ok) {
            alert("Despesa salva com sucesso!");
            document.getElementById('descDespesa').value = '';
            document.getElementById('valorDespesa').value = '';
            listarDespesas();
        } else {
            alert("Erro ao salvar dados no Baserow.");
        }
    } catch (err) {
        console.error(err);
        alert("Erro na conexão.");
    }
}

listarDespesas();
</script>
</body>
</html>
