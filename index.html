<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V.E BATATAS E PRATINHOS</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="login-box">

    <h1>V.E BATATAS E PRATINHOS</h1>

    <input
        type="text"
        id="usuario"
        placeholder="Usuário"
    >

    <input
        type="password"
        id="senha"
        placeholder="Senha"
    >

    <button onclick="login()">
        Entrar
    </button>

</div>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
